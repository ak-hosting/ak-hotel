# AK Hotel - Docker Compose Yapılandırması
# Hızlı başlatma için Docker Compose dosyası

version: '3.8'

services:
  ak-hotel:
    build: .
    ports:
      - "3000:80"
    container_name: ak-hotel
    restart: unless-stopped
    environment:
      - NODE_ENV=production
    volumes:
      - ./assets:/usr/share/nginx/html/assets:ro
    networks:
      - ak-hotel-network

  # Gelecekte backend için (opsiyonel)
